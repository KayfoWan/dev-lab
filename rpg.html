<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPG</title>
    <link rel="stylesheet" href="/src/styles/global.css">
    <style>
        body {
            background-color: black;

        #canvas1 {

            top: 50%;

            max-height: 95%;
        }
        .assets {
            display: none;
        }
    </style>
</head>
<body>
    <canvas id="canvas1"></canvas>
    <div class="assets">
        <img src="/assets/rpg/backgroundLevel1.png" alt="backgroundLevel1" id="backgroundLevel1">
        <img src="/assets/rpg/foregroundLevel1.png" alt="foregroundLevel1" id="foregroundLevel1">
        <img src="/assets/rpg/hero1.png" alt="hero" id="hero1">
    </div>
    <script src="/src/scripts/rpg/main.js" type="module"></script>
</body>
</html>
