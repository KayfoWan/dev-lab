<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Art Gallery</title>
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            padding: 0;
            margin: 0;
        }

        body {
            margin: 0;
        }

        h1, h2 {
            color: white;
            text-align: center;
            width: 100%;
            font-weight: 100;
            font-family: Verdana, Geneva, Tahoma, sans-serif;
            transition: opacity 0.5s ease-in-out;
        }

        #title {
            font-size: 2.5rem;
            position: fixed;
            top: 5rem;
        }

        #artist {
            font-family: Arial, Helvetica, sans-serif;
            font-size: 1.5rem;
            position: fixed;
            color: grey;
            top: 8.5rem;
        }


    </style>
</head>
<body>
    <script type="module" src="/scripts/script.js"></script>
    <h1 id="title"></h1>
    <h2 id="artist"></h2>
</body>
</html>
