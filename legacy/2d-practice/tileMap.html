<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tile Map</title>
    <link rel="stylesheet" href="/src/styles/global.css">
    <style>
        body {
            background-color: black;
        }
        #canvas1 {
            border: 2px solid white;
            position: absolute;
            top: 50%;
            left: 50%;
            translate: -50% -50%;
            max-width: 95%;
            max-height: 95%;
            image-rendering: crisp-edges;
            image-rendering: pixelated;
        }
        .assets {
            display: none;
        }
    </style>
</head>
<body>
    <canvas id="canvas1"></canvas>
    
    <div class="assets">
        <img src="/assets/full_map.png" alt="full_map" id="full_map">
        <img src="/assets/tilemap1.png" alt="tilemap1" id="tilemap1">
    </div>
    <script src="/src/scripts/tileMap/game.js" type="module"></script>
</body>
</html>
